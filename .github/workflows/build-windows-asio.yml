name: Build Windows SonoBus ASIO

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-windows-asio.yml"
      - "sonobus/**"

jobs:
  build-windows-asio:
    name: Windows x64 Release ASIO
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Steinberg ASIO SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sdkUrl = "https://www.steinberg.net/asiosdk"
          $zipPath = Join-Path $env:RUNNER_TEMP "asiosdk.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "asiosdk"

          Invoke-WebRequest -Uri $sdkUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          $commonPath = Get-ChildItem -Path $extractPath -Directory -Recurse |
            Where-Object { $_.Name -eq "common" -and (Test-Path (Join-Path $_.FullName "iasiodrv.h")) } |
            Select-Object -First 1

          if ($null -eq $commonPath) {
            Write-Error "Downloaded ASIO SDK, but could not find common/iasiodrv.h."
          }

          New-Item -ItemType Directory -Force -Path asiosdk | Out-Null
          Copy-Item -Recurse -Force $commonPath.FullName asiosdk/common
          Get-ChildItem asiosdk/common | Select-Object Name, Length

      - name: Configure
        shell: pwsh
        working-directory: sonobus
        run: >
          cmake
          -G "Visual Studio 17 2022"
          -A x64
          -DSONOBUS_ENABLE_ASIO=ON
          -B build

      - name: Build
        shell: pwsh
        working-directory: sonobus
        run: cmake --build build --config Release --parallel

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows-x64-asio | Out-Null
          Copy-Item -Recurse -Force sonobus/build/SonoBus_artefacts/Release/Standalone/SonoBus.exe artifacts/windows-x64-asio/
          Copy-Item -Recurse -Force sonobus/build/SonoBus_artefacts/Release/VST3/SonoBus.vst3 artifacts/windows-x64-asio/
          Copy-Item -Recurse -Force sonobus/build/SonoBusInst_artefacts/Release/VST3/SonoBusInstrument.vst3 artifacts/windows-x64-asio/
          Copy-Item -Force README.md,LICENSE,LICENSE_EXCEPTION,NOTICE.md artifacts/windows-x64-asio/
          Copy-Item -Force sonobus/LICENSE artifacts/windows-x64-asio/sonobus-LICENSE
          Copy-Item -Force sonobus/LICENSE_EXCEPTION artifacts/windows-x64-asio/sonobus-LICENSE_EXCEPTION

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sonobus-windows-x64-asio
          path: artifacts/windows-x64-asio
