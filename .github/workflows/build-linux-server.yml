name: Build Linux Server Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-linux-server.yml"
      - "deploy/**"
      - "docs/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"

jobs:
  build-linux-server:
    name: Linux Server Docker Bundle
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Build Docker image
        run: docker build -f deploy/Dockerfile.server -t lossless-audio-server:ci .

      - name: Collect deploy bundle
        run: |
          mkdir -p artifacts/lossless-audio-server
          cp -pR deploy artifacts/lossless-audio-server/
          cp -pR docs artifacts/lossless-audio-server/
          cp -pR packages artifacts/lossless-audio-server/
          mkdir -p artifacts/lossless-audio-server/tools artifacts/lossless-audio-server/sonobus/deps
          cp -pR tools/connection-server artifacts/lossless-audio-server/tools/
          cp -pR sonobus/deps/aoo artifacts/lossless-audio-server/sonobus/deps/
          cp -p package.json package-lock.json tsconfig.base.json README.md artifacts/lossless-audio-server/
          tar -czf lossless-audio-server-linux-docker.tar.gz -C artifacts lossless-audio-server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lossless-audio-server-linux-docker
          path: lossless-audio-server-linux-docker.tar.gz
